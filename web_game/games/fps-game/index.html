<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Segoe UI',sans-serif;color:#fff;user-select:none}
canvas{display:block}
.ch{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:10;transition:all .08s}
.ch .l{position:absolute;background:rgba(255,255,255,.8)}.ch .h{width:16px;height:1.5px}.ch .v{width:1.5px;height:16px}
.ch .h.a{right:6px;top:-.75px}.ch .h.b{left:6px;top:-.75px}.ch .v.a{left:-.75px;bottom:6px}.ch .v.b{left:-.75px;top:6px}
.ch .dot{position:absolute;width:3px;height:3px;background:#f33;border-radius:50%;top:-1.5px;left:-1.5px}
.ch.hit .l{background:#f33}.ch.spread .h.a{right:10px}.ch.spread .h.b{left:10px}.ch.spread .v.a{bottom:10px}.ch.spread .v.b{top:10px}
.hud{position:fixed;z-index:10;pointer-events:none}
.h-hp{bottom:20px;left:20px}.hp-bar{width:200px;height:8px;background:rgba(0,0,0,.5);border-radius:4px;border:1px solid rgba(255,255,255,.12)}.hp-f{height:100%;border-radius:4px;transition:width .3s}.hp-f.hi{background:linear-gradient(90deg,#4ade80,#22c55e)}.hp-f.md{background:linear-gradient(90deg,#fbbf24,#f59e0b)}.hp-f.lo{background:#ef4444}
.hp-lbl{font-size:10px;color:rgba(255,255,255,.4);margin-top:3px}
.arm-bar{width:200px;height:4px;background:rgba(0,0,0,.3);border-radius:2px;margin-top:3px}.arm-f{height:100%;background:linear-gradient(90deg,#38bdf8,#0ea5e9);border-radius:2px}
.h-score{top:16px;right:16px;text-align:right}.sv{font-size:28px;font-weight:800;color:#ffd700;text-shadow:0 0 15px rgba(255,215,0,.2)}.combo{font-size:13px;color:#ff9f43;font-weight:700}.kc{font-size:11px;color:rgba(255,255,255,.3);margin-top:3px}
.h-timer{top:16px;left:50%;transform:translateX(-50%)}.t-ring{width:56px;height:56px;border-radius:50%;border:2px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);backdrop-filter:blur(4px)}.t-txt{font-size:22px;font-weight:800}.t-txt.low{color:#ef4444;animation:p 1s infinite}@keyframes p{50%{opacity:.4}}
.h-wep{bottom:16px;right:16px;background:rgba(0,0,0,.45);padding:12px 18px;border-radius:10px;border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(8px);min-width:150px;text-align:center}
.wn{font-size:12px;font-weight:700;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:2px;margin-bottom:3px}.am{display:flex;align-items:baseline;justify-content:center;gap:3px}.am-m{font-size:32px;font-weight:800}.am-s{font-size:18px;color:rgba(255,255,255,.25)}.am-r{font-size:16px;color:rgba(255,255,255,.35);font-weight:600}
.wslots{display:flex;gap:5px;margin-top:6px;justify-content:center}.ws{padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.25);transition:.15s}.ws.on{background:rgba(255,215,0,.1);border-color:rgba(255,215,0,.3);color:#ffd700}
.h-reload{bottom:70px;left:50%;transform:translateX(-50%);font-size:13px;font-weight:700;color:#f59e0b;letter-spacing:3px;display:none;text-shadow:0 0 8px rgba(245,158,11,.2)}
.h-mode{top:70px;left:50%;transform:translateX(-50%);font-size:12px;color:rgba(255,255,255,.4);background:rgba(0,0,0,.25);padding:4px 14px;border-radius:12px;backdrop-filter:blur(4px)}
.h-minimap{top:70px;right:16px;width:130px;height:130px;border-radius:50%;border:2px solid rgba(255,255,255,.08);overflow:hidden;background:rgba(0,0,0,.3);backdrop-filter:blur(4px)}
#mm{width:100%;height:100%;border-radius:50%}
.h-kf{top:100px;left:16px;font-size:11px;line-height:1.7}
.kfe{opacity:0;transition:opacity .3s;color:rgba(255,255,255,.6)}.kfe.show{opacity:1}.kfe .hl{color:#ffd700;font-weight:700}
.h-keys{bottom:16px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,.15);text-align:center}
.hm{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);pointer-events:none;z-index:15;opacity:0;transition:all .2s}
.hm.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.hm .hl{position:absolute;width:10px;height:1.5px;background:#fff}
.hm .hl:nth-child(1){transform:translate(5px,-5px) rotate(45deg)}.hm .hl:nth-child(2){transform:translate(-14px,-5px) rotate(-45deg)}
.hm .hl:nth-child(3){transform:translate(5px,5px) rotate(-45deg)}.hm .hl:nth-child(4){transform:translate(-14px,5px) rotate(45deg)}
.hm.hs .hl{background:#f33;box-shadow:0 0 6px #f33}
.hp{position:fixed;pointer-events:none;z-index:15;font-size:16px;font-weight:800;color:#ffd700;text-shadow:0 0 6px rgba(255,215,0,.3);opacity:0;transition:all .4s}.hp.show{opacity:1}
.df{position:fixed;inset:0;pointer-events:none;z-index:5;background:radial-gradient(ellipse,transparent 30%,rgba(255,0,0,.3) 100%);opacity:0;transition:opacity .15s}.df.show{opacity:1}
.dv{position:fixed;inset:0;pointer-events:none;z-index:4;background:radial-gradient(ellipse,transparent 50%,rgba(180,0,0,.35) 100%);opacity:0;transition:opacity .4s}
.mf{position:fixed;bottom:12%;left:50%;transform:translateX(-50%);width:50px;height:50px;border-radius:50%;background:radial-gradient(circle,rgba(255,200,50,.8),rgba(255,100,0,.3),transparent 70%);pointer-events:none;z-index:8;opacity:0;transition:opacity .03s}.mf.show{opacity:1}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:14px;backdrop-filter:blur(10px)}
.ov h1{font-size:2.8rem;font-weight:900;letter-spacing:3px;text-transform:uppercase}
.ov h1 .ac{background:linear-gradient(90deg,#f59e0b,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ov p{color:rgba(255,255,255,.4);font-size:13px;max-width:500px;text-align:center;line-height:1.7}
.ov .sf{font-size:4rem;font-weight:900;color:#ffd700;text-shadow:0 0 30px rgba(255,215,0,.2)}
.ov .sr{display:flex;gap:24px;color:rgba(255,255,255,.35);font-size:12px}.ov .sr span{color:#ffd700;font-weight:700}
.ov button{padding:12px 36px;border:1.5px solid rgba(255,255,255,.15);border-radius:4px;font-size:14px;font-weight:800;cursor:pointer;color:#fff;background:rgba(255,255,255,.04);transition:.2s;text-transform:uppercase;letter-spacing:2px}
.ov button:hover{background:rgba(255,255,255,.12);border-color:rgba(255,215,0,.4);color:#ffd700}
.ov .bk{font-size:12px;padding:8px 20px;border-color:rgba(255,255,255,.08);color:rgba(255,255,255,.3)}
.hidden{display:none!important}
.sel-grid{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:500px}
.sel-card{padding:8px 16px;border:1.5px solid rgba(255,255,255,.1);border-radius:6px;cursor:pointer;transition:.2s;background:rgba(255,255,255,.03);text-align:center;min-width:80px}
.sel-card:hover{border-color:rgba(255,215,0,.4);background:rgba(255,215,0,.05)}
.sel-card.active{border-color:#ffd700;color:#ffd700;background:rgba(255,215,0,.1)}
.sel-card .icon{font-size:24px;display:block;margin-bottom:4px}
.sel-card .name{font-size:11px;font-weight:700}
.sel-section{margin:10px 0 6px;font-size:11px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:2px}

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import*as THREE from'three';
import{EffectComposer}from'three/addons/postprocessing/EffectComposer.js';
import{RenderPass}from'three/addons/postprocessing/RenderPass.js';
import{UnrealBloomPass}from'three/addons/postprocessing/UnrealBloomPass.js';
import{OutputPass}from'three/addons/postprocessing/OutputPass.js';

const ctr=document.getElementById('ctr');
const renderer=new THREE.WebGLRenderer({antialias:false,powerPreference:'high-performance'});
renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.1;
ctr.appendChild(renderer.domElement);
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,200);
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.25,0.3,0.88));
composer.addPass(new OutputPass());

function mkTex(w,h,fn){const c=document.createElement('canvas');c.width=w;c.height=h;fn(c.getContext('2d'),w,h);const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;return t}
const concTex=mkTex(512,512,(x,w,h)=>{x.fillStyle='#3a3a3e';x.fillRect(0,0,w,h);for(let i=0;i<6000;i++){x.fillStyle=`rgba(${55+Math.random()*35},${53+Math.random()*35},${58+Math.random()*35},.25)`;x.fillRect(Math.random()*w,Math.random()*h,1+Math.random()*3,1+Math.random()*3)}});concTex.repeat.set(4,4);
const floorTex=mkTex(512,512,(x,w,h)=>{x.fillStyle='#2a2a2c';x.fillRect(0,0,w,h);const ts=64;for(let r=0;r<h/ts;r++)for(let c=0;c<w/ts;c++){const b=36+Math.random()*10;x.fillStyle=`rgb(${b},${b},${b+2})`;x.fillRect(c*ts+1,r*ts+1,ts-2,ts-2);x.strokeStyle='rgba(20,20,22,.4)';x.lineWidth=1;x.strokeRect(c*ts,r*ts,ts,ts)}});floorTex.repeat.set(6,6);
const sandTex=mkTex(512,512,(x,w,h)=>{x.fillStyle='#c2a060';x.fillRect(0,0,w,h);for(let i=0;i<5000;i++){x.fillStyle=`rgba(${170+Math.random()*40},${140+Math.random()*30},${80+Math.random()*30},.2)`;x.fillRect(Math.random()*w,Math.random()*h,1+Math.random()*2,1+Math.random()*2)}});sandTex.repeat.set(8,8);
const brickTex=mkTex(256,256,(x,w,h)=>{x.fillStyle='#8b4513';x.fillRect(0,0,w,h);const bw=32,bh=16;for(let r=0;r<h/bh;r++)for(let c=0;c<w/bw+1;c++){const off=r%2?bw/2:0;const b=100+Math.random()*40;x.fillStyle=`rgb(${b+40},${b-10},${b-30})`;x.fillRect(c*bw+off+1,r*bh+1,bw-2,bh-2)}});brickTex.repeat.set(3,3);
const metalTex=mkTex(256,256,(x,w,h)=>{x.fillStyle='#555560';x.fillRect(0,0,w,h);for(let i=0;i<200;i++){x.strokeStyle=`rgba(${70+Math.random()*25},${70+Math.random()*25},${75+Math.random()*25},.12)`;x.lineWidth=.5;x.beginPath();x.moveTo(0,Math.random()*h);x.lineTo(w,Math.random()*h);x.stroke()}});
const crateTex=mkTex(256,256,(x,w,h)=>{x.fillStyle='#5a4530';x.fillRect(0,0,w,h);x.strokeStyle='#3a2a1a';x.lineWidth=4;x.strokeRect(6,6,w-12,h-12);x.beginPath();x.moveTo(6,6);x.lineTo(w-6,h-6);x.stroke();x.beginPath();x.moveTo(w-6,6);x.lineTo(6,h-6);x.stroke()});

const CHARS=[
  {name:'突击兵',icon:'🔥',color:0x2266cc,speed:1,hp:100,armor:50},
  {name:'侦察兵',icon:'👁',color:0x22cc66,speed:1.3,hp:80,armor:30},
  {name:'重装兵',icon:'🛡',color:0xcc6622,speed:0.8,hp:150,armor:80},
  {name:'医疗兵',icon:'💊',color:0xcc2266,speed:1.1,hp:90,armor:40}
];
const MAPS=[
  {name:'仓库',icon:'🏭',size:[45,35],h:7,bg:0x111118,fog:.018,floor:floorTex,wall:concTex},
  {name:'沙漠',icon:'🏜',size:[60,50],h:0,bg:0x87CEEB,fog:.005,floor:sandTex,wall:brickTex},
  {name:'工厂',icon:'⚙',size:[50,40],h:8,bg:0x0a0a14,fog:.02,floor:floorTex,wall:metalTex}
];
const MODES=[
  {name:'自由射击',icon:'🎯',desc:'限时消灭目标',time:90},
  {name:'团队竞技',icon:'⚔',desc:'与AI组队对抗',time:120},
  {name:'拆弹模式',icon:'💣',desc:'阻止炸弹爆炸',time:90}
];
const WEAPONS=[
  {name:'PISTOL',mag:15,res:Infinity,rate:300,spread:.008,rays:1,recoil:.012,dmg:25},
  {name:'RIFLE',mag:30,res:120,rate:90,spread:.02,rays:1,recoil:.008,dmg:20},
  {name:'SHOTGUN',mag:8,res:32,rate:650,spread:.08,rays:7,recoil:.035,dmg:15},
  {name:'SMG',mag:35,res:140,rate:65,spread:.03,rays:1,recoil:.006,dmg:15},
  {name:'SNIPER',mag:5,res:25,rate:1200,spread:.002,rays:1,recoil:.05,dmg:80},
  {name:'LMG',mag:60,res:120,rate:80,spread:.035,rays:1,recoil:.01,dmg:18}
];

let selChar=0,selMap=0,selMode=0;
function buildSelectors(){
  const cs=document.getElementById('charSel');cs.innerHTML='';
  CHARS.forEach((c,i)=>{const d=document.createElement('div');d.className='sel-card'+(i===selChar?' active':'');d.innerHTML=`<span class="icon">${c.icon}</span><span class="name">${c.name}</span>`;d.onclick=()=>{selChar=i;buildSelectors()};cs.appendChild(d)});
  const ms=document.getElementById('mapSel');ms.innerHTML='';
  MAPS.forEach((m,i)=>{const d=document.createElement('div');d.className='sel-card'+(i===selMap?' active':'');d.innerHTML=`<span class="icon">${m.icon}</span><span class="name">${m.name}</span>`;d.onclick=()=>{selMap=i;buildSelectors()};ms.appendChild(d)});
  const ds=document.getElementById('modeSel');ds.innerHTML='';
  MODES.forEach((m,i)=>{const d=document.createElement('div');d.className='sel-card'+(i===selMode?' active':'');d.innerHTML=`<span class="icon">${m.icon}</span><span class="name">${m.name}</span>`;d.onclick=()=>{selMode=i;buildSelectors()};ds.appendChild(d)});
}
buildSelectors();

let S={running:false};
const rc=new THREE.Raycaster();
let mouseDown=false;
const ac=new(window.AudioContext||window.webkitAudioContext)();
function pn(dur,vol){const b=ac.createBuffer(1,ac.sampleRate*dur,ac.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);const s=ac.createBufferSource();s.buffer=b;const g=ac.createGain();g.gain.setValueAtTime(vol||.08,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+dur);const f=ac.createBiquadFilter();f.type='lowpass';f.frequency.value=2500;s.connect(f);f.connect(g);g.connect(ac.destination);s.start()}
function pt(f,d,t,v){const o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type=t||'sine';o.frequency.setValueAtTime(f,ac.currentTime);g.gain.setValueAtTime(v||.06,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);o.start();o.stop(ac.currentTime+d)}
function sShoot(){if(ac.state==='suspended')ac.resume();const w=WEAPONS[S.wIdx];if(w.name==='SHOTGUN'){pn(.12,.15);pt(70,.1,'sawtooth',.12)}else if(w.name==='SNIPER'){pn(.15,.18);pt(100,.12,'sawtooth',.15);pt(50,.2,'square',.08)}else{pn(.06,.1);pt(150,.05,'sawtooth',.08)}}
function sHit(){pt(1000,.05,'square',.08);pt(800,.03,'sine',.05)}
function sKill(){pt(600,.1);pt(800,.1,'sine',.05);pt(1000,.15,'sine',.04)}

function clearScene(){while(scene.children.length)scene.remove(scene.children[0])}

function buildMap(idx){
  clearScene();
  const map=MAPS[idx],W=map.size[0],D=map.size[1],H=map.h;
  scene.background=new THREE.Color(map.bg);
  scene.fog=new THREE.FogExp2(map.bg,map.fog);
  const floorMat=new THREE.MeshStandardMaterial({map:map.floor,roughness:.85,metalness:.1});
  const wallMat=new THREE.MeshStandardMaterial({map:map.wall,roughness:.9,metalness:.05});
  const metalMat=new THREE.MeshStandardMaterial({map:metalTex,roughness:.3,metalness:.8});
  const crtMat=new THREE.MeshStandardMaterial({map:crateTex,roughness:.85});
  scene.add(new THREE.AmbientLight(0x404060,.5));
  const sun=new THREE.DirectionalLight(idx===1?0xfff0cc:0xffeedd,idx===1?1.5:1);
  sun.position.set(10,20,10);sun.castShadow=true;sun.shadow.mapSize.set(2048,2048);
  sun.shadow.camera.left=-W/2;sun.shadow.camera.right=W/2;sun.shadow.camera.top=D/2;sun.shadow.camera.bottom=-D/2;sun.shadow.bias=-.001;
  scene.add(sun);
  const fl=new THREE.Mesh(new THREE.PlaneGeometry(W,D),floorMat);fl.rotation.x=-Math.PI/2;fl.receiveShadow=true;scene.add(fl);
  if(H>0){
    const ceil=new THREE.Mesh(new THREE.PlaneGeometry(W,D),new THREE.MeshStandardMaterial({color:0x222228,roughness:1}));ceil.rotation.x=Math.PI/2;ceil.position.y=H;scene.add(ceil);
    [[0,H/2,-D/2,W,H,0],[0,H/2,D/2,W,H,Math.PI],[-W/2,H/2,0,D,H,Math.PI/2],[W/2,H/2,0,D,H,-Math.PI/2]].forEach(([x,y,z,w,h,ry])=>{const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),wallMat);m.position.set(x,y,z);m.rotation.y=ry;m.receiveShadow=true;scene.add(m)})
  }

function shoot(){
  if(!S.running||S.reloading)return;
  const w=WEAPONS[S.wIdx],now=performance.now();
  if(now-S.lastFire<w.rate)return;
  if(S.mag<=0){startReload();return}
  S.mag--;S.lastFire=now;S.shotsFired++;S.vmRecoil=w.recoil;
  updateWepUI();sShoot();
  const mf=document.getElementById('mF');mf.classList.add('show');setTimeout(()=>mf.classList.remove('show'),35);
  const ch=document.getElementById('ch');ch.classList.add('spread');setTimeout(()=>ch.classList.remove('spread'),80);
  let hitAny=false;
  for(let r=0;r<w.rays;r++){
    const sx=(Math.random()-.5)*w.spread,sy=(Math.random()-.5)*w.spread;
    const dir=new THREE.Vector3(sx,sy,-1).applyQuaternion(camera.quaternion).normalize();
    rc.set(camera.position,dir);
    const all=[...S.targets,...S.enemies].filter(t=>t.userData.alive);
    const hits=rc.intersectObjects(all,true);
    if(!hits.length)continue;
    const hit=hits[0];let target=hit.object;
    while(target.parent&&target.userData.alive===undefined)target=target.parent;
    if(!target.userData||!target.userData.alive)continue;
    hitAny=true;S.shotsHit++;
    const isEnemy=S.enemies.includes(target);
    const dmg=isEnemy?w.dmg:999;
    target.userData.hp-=dmg;
    if(target.userData.hp<=0){
      target.userData.alive=false;
      if(isEnemy){
        const isHs=hit.point.y>target.position.y+1.3;
        const pts=isHs?80:50;if(isHs)S.headshots++;
        S.kills++;S.score+=pts;
        if(now-S.lastHitTime<2000){S.combo++;if(S.combo>S.maxCombo)S.maxCombo=S.combo}else S.combo=0;
        S.lastHitTime=now;
        showHit(isHs,pts);addKF(`<span class="hl">你</span> ${isHs?'🎯爆头':''}击杀 敌人 <span class="hl">+${pts}</span>`);
        sKill();target.visible=false;target.userData.respawn=now+8000;
      }else{
        const isHs=hit.point.y>target.position.y+.25;
        const pts=isHs?25:10;if(isHs)S.headshots++;
        if(now-S.lastHitTime<2000){S.combo++;if(S.combo>S.maxCombo)S.maxCombo=S.combo}else S.combo=0;
        S.lastHitTime=now;S.score+=pts;
        showHit(isHs,pts);sHit();scene.remove(target);S.targets=S.targets.filter(t=>t!==target);
      }
      document.getElementById('kC').textContent=S.kills;document.getElementById('hsC').textContent=S.headshots;
    }else{
      target.userData.flashTime=now;
      target.traverse(c=>{if(c.isMesh)c.material.emissive=new THREE.Color(0xff0000)});
      setTimeout(()=>target.traverse(c=>{if(c.isMesh)c.material.emissive=new THREE.Color(0)}),100);
      sHit();showHit(false,0);
    }
  }
  updateScoreUI();
}

function takeDamage(amt){let d=amt;if(S.armor>0){const ab=Math.min(S.armor,0|d*.6);S.armor-=ab;d-=ab}S.hp=Math.max(0,S.hp-d);updateHpUI();pt(100,.15,'sawtooth',.08);const f=document.getElementById('dF');f.classList.add('show');setTimeout(()=>f.classList.remove('show'),150);if(S.hp<=0)endGame()}

function endGame(){S.running=false;document.exitPointerLock();document.getElementById('fS').textContent=S.score;document.getElementById('fK').textContent=S.kills;document.getElementById('fH').textContent=S.headshots;document.getElementById('fA').textContent=S.shotsFired>0?Math.round(S.shotsHit/S.shotsFired*100)+'%':'0%';document.getElementById('endScr').classList.remove('hidden');const b=parseInt(localStorage.getItem('highscore_fps_game')||'0');if(S.score>b)localStorage.setItem('highscore_fps_game',S.score)}

let lastT=0,waveT=0,timerA=0;
const SPEED=6,SPRINT=1.7,JUMP=8,GRAV=18,FRIC=7;

function animate(time){
  requestAnimationFrame(animate);
  const dt=Math.min((time-lastT)/1000,.05);lastT=time;
  if(!S.running){composer.render();return}
  const now=performance.now();
  const map=MAPS[selMap],hW=map.size[0]/2-.5,hD=map.size[1]/2-.5;

  timerA+=dt;if(timerA>=1){timerA-=1;S.timeLeft--;const el=document.getElementById('tT');el.textContent=S.timeLeft;if(S.timeLeft<=10)el.classList.add('low');if(S.timeLeft<=0)endGame()}

  waveT+=dt;if(waveT>=6){waveT=0;if(S.targets.length<10)for(let i=0;i<3;i++)spawnTarget()}

  const md=new THREE.Vector3();
  if(S.moveF)md.z-=1;if(S.moveB)md.z+=1;if(S.moveL)md.x-=1;if(S.moveR)md.x+=1;
  if(md.length()>0){md.normalize().applyAxisAngle(new THREE.Vector3(0,1,0),S.yaw);const spd=SPEED*S.charSpeed*(S.sprint?SPRINT:1)*(S.crouching?.5:1);S.vel.x+=md.x*spd*dt*10;S.vel.z+=md.z*spd*dt*10}
  S.vel.x-=S.vel.x*FRIC*dt;S.vel.z-=S.vel.z*FRIC*dt;

  if(S.jump&&S.onGround){S.vy=JUMP;S.onGround=false;pt(400,.04,'sine',.03)}
  if(S.crouch&&!S.crouching&&S.onGround&&S.sprint&&S.vel.length()>3){S.sliding=true;S.slideTimer=.6;S.crouching=true}else if(S.crouch&&!S.crouching){S.crouching=true}
  if(!S.crouch&&S.crouching&&!S.sliding){S.crouching=false}

  if(S.sliding){S.slideTimer-=dt;if(S.slideTimer<=0){S.sliding=false;S.crouching=S.crouch}}

  S.vy-=GRAV*dt;
  camera.position.x+=S.vel.x*dt;camera.position.z+=S.vel.z*dt;camera.position.y+=S.vy*dt;
  const eyeH=S.crouching?1.1:1.7;
  if(camera.position.y<=eyeH){camera.position.y=eyeH;S.vy=0;S.onGround=true}
  camera.position.x=Math.max(-hW,Math.min(hW,camera.position.x));
  camera.position.z=Math.max(-hD,Math.min(hD,camera.position.z));
  camera.position.y+=Math.sin(time*.008)*(md.length()>0?.025:.004);

  if(S.vmRecoil>.0005){S.vm.rotation.x=-S.vmRecoil;S.vmRecoil*=.82}else S.vm.rotation.x*=.9;

  S.targets.forEach(t=>{if(!t.userData.alive)return;if(t.userData.speed>0){t.position.x+=t.userData.speed*t.userData.moveDir*dt;if(Math.abs(t.position.x-(t.userData.startX||0))>5)t.userData.moveDir*=-1}if(t.userData.rotSpeed)t.rotation.y+=t.userData.rotSpeed*dt});

  S.enemies.forEach(e=>{
    if(!e.userData.alive){if(e.userData.respawn&&now>e.userData.respawn){e.userData.alive=true;e.userData.hp=100;e.visible=true;e.position.set((Math.random()-.5)*(map.size[0]-6),0,(Math.random()-.5)*(map.size[1]-6))}return}
    const dist=camera.position.distanceTo(e.position);
    e.userData.phase+=dt*5;
    if(e.children[4])e.children[4].rotation.x=Math.sin(e.userData.phase)*.25;
    if(e.children[5])e.children[5].rotation.x=-Math.sin(e.userData.phase)*.25;

    if(dist<30){
      const dir=new THREE.Vector3().subVectors(camera.position,e.position);dir.y=0;dir.normalize();
      if(dist>3){e.position.add(dir.clone().multiplyScalar(e.userData.speed*dt))}
      e.lookAt(camera.position.x,e.position.y,camera.position.z);
      e.userData.shootTimer-=dt;
      if(e.userData.shootTimer<=0&&dist<20){e.userData.shootTimer=1+Math.random()*2;if(Math.random()<.4)takeDamage(5+Math.random()*10|0)}
    }else{
      e.userData.wanderTimer-=dt;
      if(e.userData.wanderTimer<=0){e.userData.wanderAngle+=((Math.random()-.5)*2);e.userData.wanderTimer=2+Math.random()*3}
      e.position.x+=Math.cos(e.userData.wanderAngle)*e.userData.speed*.5*dt;
      e.position.z+=Math.sin(e.userData.wanderAngle)*e.userData.speed*.5*dt;
    }
    e.position.x=Math.max(-hW,Math.min(hW,e.position.x));
    e.position.z=Math.max(-hD,Math.min(hD,e.position.z));
    if(dist<1.8){takeDamage(12);const push=new THREE.Vector3().subVectors(camera.position,e.position).normalize().multiplyScalar(2);camera.position.add(push.clone().multiplyScalar(dt*5))}
  });

  S.allies.forEach(a=>{if(!a.userData.alive)return;
    const nearest=S.enemies.filter(e=>e.userData.alive).sort((x,y)=>x.position.distanceTo(a.position)-y.position.distanceTo(a.position))[0];
    if(nearest){const dir=new THREE.Vector3().subVectors(nearest.position,a.position);dir.y=0;const dist=dir.length();dir.normalize();
      if(dist>4)a.position.add(dir.clone().multiplyScalar(a.userData.speed*dt));
      a.lookAt(nearest.position.x,a.position.y,nearest.position.z);
      a.userData.shootTimer-=dt;
      if(a.userData.shootTimer<=0&&dist<18){a.userData.shootTimer=1.5+Math.random()*2;if(Math.random()<.3){nearest.userData.hp-=15;if(nearest.userData.hp<=0){nearest.userData.alive=false;nearest.visible=false;nearest.userData.respawn=now+10000;addKF(`<span style="color:#38bdf8">队友</span> 击杀 敌人`)}}}}
    a.userData.phase+=dt*4;if(a.children[4])a.children[4].rotation.x=Math.sin(a.userData.phase)*.2;if(a.children[5])a.children[5].rotation.x=-Math.sin(a.userData.phase)*.2});

  if(S.bomb&&!S.bombDefused){S.bomb.children[1].material.emissiveIntensity=2+Math.sin(now*.005)*1;
    if(camera.position.distanceTo(S.bomb.position)<2){document.getElementById('modeT').textContent='💣 按 E 拆弹';if(S.defusing){S.defuseTimer-=dt;if(S.defuseTimer<=0){S.bombDefused=true;S.score+=500;S.bomb.visible=false;addKF('<span class="hl">炸弹已拆除 +500!</span>');document.getElementById('modeT').textContent='✅ 炸弹已拆除'}}}else{document.getElementById('modeT').textContent=MODES[selMode].name;S.defusing=false}}

  drawMinimap();
  composer.render();
}

function drawMinimap(){const mc=document.getElementById('mm'),mx=mc.getContext('2d'),cw=mc.width,ch=mc.height;
  mx.clearRect(0,0,cw,ch);mx.fillStyle='rgba(0,0,0,.25)';mx.fillRect(0,0,cw,ch);
  const map=MAPS[selMap],scale=cw/(map.size[0]+4),cx=cw/2,cy=ch/2;
  mx.strokeStyle='rgba(255,255,255,.1)';mx.lineWidth=1;mx.strokeRect(cx-map.size[0]/2*scale,cy-map.size[1]/2*scale,map.size[0]*scale,map.size[1]*scale);
  mx.fillStyle='#4ade80';mx.beginPath();mx.arc(cx+camera.position.x*scale,cy+camera.position.z*scale,3,0,Math.PI*2);mx.fill();
  S.enemies.forEach(e=>{if(!e.userData.alive)return;mx.fillStyle='#ef4444';mx.beginPath();mx.arc(cx+e.position.x*scale,cy+e.position.z*scale,2,0,Math.PI*2);mx.fill()});
  S.allies.forEach(a=>{if(!a.userData.alive)return;mx.fillStyle='#38bdf8';mx.beginPath();mx.arc(cx+a.position.x*scale,cy+a.position.z*scale,2,0,Math.PI*2);mx.fill()});
  S.targets.forEach(t=>{if(!t.userData.alive)return;mx.fillStyle='#fbbf24';mx.fillRect(cx+t.position.x*scale-1.5,cy+t.position.z*scale-1.5,3,3)});
  if(S.bomb&&!S.bombDefused){mx.fillStyle=`rgba(255,0,0,${.5+Math.sin(performance.now()*.005)*.5})`;mx.beginPath();mx.arc(cx+S.bomb.position.x*scale,cy+S.bomb.position.z*scale,4,0,Math.PI*2);mx.fill()}}

document.addEventListener('mousemove',e=>{if(document.pointerLockElement!==renderer.domElement)return;S.yaw-=e.movementX*.002;S.pitch-=e.movementY*.002;S.pitch=Math.max(-1.4,Math.min(1.4,S.pitch));camera.rotation.set(S.pitch,S.yaw,0,'YXZ')});
document.addEventListener('mousedown',e=>{if(e.button===0&&document.pointerLockElement===renderer.domElement){shoot();mouseDown=true}});
document.addEventListener('mouseup',e=>{if(e.button===0)mouseDown=false});
setInterval(()=>{if(mouseDown&&document.pointerLockElement===renderer.domElement&&S.running)shoot()},40);
document.addEventListener('keydown',e=>{
  if(e.key==='w'||e.key==='W')S.moveF=true;if(e.key==='s'||e.key==='S')S.moveB=true;
  if(e.key==='a'||e.key==='A')S.moveL=true;if(e.key==='d'||e.key==='D')S.moveR=true;
  if(e.key==='Shift')S.sprint=true;if(e.key===' '){e.preventDefault();S.jump=true}
  if(e.key==='c'||e.key==='C')S.crouch=true;
  if(e.key==='e'||e.key==='E'){if(S.bomb&&camera.position.distanceTo(S.bomb.position)<2){S.defusing=true;S.defuseTimer=3}}
  if(!S.running)return;
  if(e.key==='r'||e.key==='R')startReload();
  for(let i=1;i<=6;i++)if(e.key===''+i)switchWep(i-1);
});
document.addEventListener('keyup',e=>{
  if(e.key==='w'||e.key==='W')S.moveF=false;if(e.key==='s'||e.key==='S')S.moveB=false;
  if(e.key==='a'||e.key==='A')S.moveL=false;if(e.key==='d'||e.key==='D')S.moveR=false;
  if(e.key==='Shift')S.sprint=false;if(e.key===' ')S.jump=false;
  if(e.key==='c'||e.key==='C')S.crouch=false;
  if(e.key==='e'||e.key==='E')S.defusing=false;
});
renderer.domElement.addEventListener('click',()=>{if(S.running&&document.pointerLockElement!==renderer.domElement)renderer.domElement.requestPointerLock()});
addEventListener('resize',()=>{const w=innerWidth,h=innerHeight;camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h);composer.setSize(w,h)});
window.startGame=startGame;
requestAnimationFrame(animate);
</script>
</body>
</html>
