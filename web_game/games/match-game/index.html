<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>开心消消乐 - MyWeb游戏平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#0a0a1a,#1a1035,#0d1b2a);color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}
.top-bar{width:100%;max-width:600px;display:flex;justify-content:space-between;align-items:center;padding:14px 20px;margin-top:10px;flex-wrap:wrap;gap:8px}
.btn-back{color:rgba(255,255,255,.5);text-decoration:none;font-size:13px;padding:8px 18px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:8px;backdrop-filter:blur(8px);transition:.2s}
.btn-back:hover{background:rgba(255,255,255,.12);color:#fff}
.stats{display:flex;gap:14px;font-size:13px;color:rgba(255,255,255,.5);flex-wrap:wrap}.stats span{color:#ffd700;font-weight:800}
canvas{border-radius:14px;cursor:pointer;touch-action:none;margin-top:12px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.info-bar{display:flex;gap:20px;margin-top:14px;font-size:14px;color:rgba(255,255,255,.5);flex-wrap:wrap;justify-content:center}
.info-bar .value{color:#ffd700;font-weight:800}
.combo-float{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);font-size:36px;font-weight:900;color:#ffd700;pointer-events:none;opacity:0;transition:all .5s;text-shadow:0 0 20px rgba(255,215,0,.4);z-index:50}
.combo-float.show{opacity:1;top:35%}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(8px)}
.modal-overlay.show{display:flex}
.modal{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:40px 50px;text-align:center;min-width:300px;box-shadow:0 30px 80px rgba(0,0,0,.6)}
.modal h2{font-size:2rem;margin-bottom:10px}.modal .score{font-size:3.5rem;color:#ffd700;font-weight:900;margin:10px 0;text-shadow:0 0 30px rgba(255,215,0,.3)}.modal p{color:rgba(255,255,255,.4);margin-bottom:20px;font-size:13px}
.modal button{padding:12px 32px;border:1.5px solid rgba(46,204,113,.4);border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;color:#2ecc71;margin:5px;background:rgba(255,255,255,.05);transition:.2s}
.modal button:hover{background:rgba(46,204,113,.15)}
#particleCanvas{position:fixed;inset:0;pointer-events:none;z-index:50}
</style>
</head>
<body>
<canvas id="particleCanvas"></canvas>
<div class="top-bar">
  <a href="/" class="btn-back">← 返回平台</a>
  <div class="stats">Lv.<span id="lvl">1</span> | 分数 <span id="score">0</span> | 目标 <span id="target">500</span></div>
</div>
<canvas id="gameCanvas"></canvas>
<div class="info-bar">
  <div>剩余步数 <span class="value" id="moves">30</span></div>
  <div>连击 <span class="value" id="combo">×1</span></div>
</div>
<div class="combo-float" id="comboFloat"></div>
<div class="modal-overlay" id="modal"><div class="modal"><h2 id="modalTitle"></h2><div class="score" id="modalScore">0</div><p id="modalMsg"></p><button id="modalBtn" onclick="restartOrNext()">继续</button></div></div>
<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const pC=document.getElementById('particleCanvas'),pX=pC.getContext('2d');
pC.width=innerWidth;pC.height=innerHeight;addEventListener('resize',()=>{pC.width=innerWidth;pC.height=innerHeight});
const GRID=8,ALL_TYPES=['🍎','🍊','🍋','🍇','🍓','🫐','🍒','🥝','🍑','🥭'],CELL=56,GAP=4,PAD=16;
function getTypes(){return ALL_TYPES.slice(0,Math.min(6+Math.floor(level/3),ALL_TYPES.length))}
function getTarget(){return 400+level*250+Math.floor(level/2)*100}
function getMoves(){return Math.max(18,32-level)}
let board=[],selected=null,score=0,moves=32,level=0,comboCount=0,animating=false,scP=[];
canvas.width=GRID*(CELL+GAP)+PAD*2-GAP;canvas.height=canvas.width;
const AC=new(window.AudioContext||window.webkitAudioContext)();
function pt(f,d,t,v){if(AC.state==='suspended')AC.resume();const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t||'sine';o.frequency.setValueAtTime(f,AC.currentTime);g.gain.setValueAtTime(v||0.08,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d)}
function spawnP(cx,cy,col,n){const r=canvas.getBoundingClientRect();const sx=r.left+cx*r.width/canvas.width,sy=r.top+cy*r.height/canvas.height;for(let i=0;i<n;i++)scP.push({x:sx,y:sy,vx:(Math.random()-.5)*10,vy:-2-Math.random()*7,life:1,col,sz:3+Math.random()*5,g:0.18})}
function initBoard(){const types=getTypes();board=Array.from({length:GRID},()=>Array(GRID).fill(null));for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){do{board[r][c]=types[0|Math.random()*types.length]}while(hasMatchAt(r,c))}}
function hasMatchAt(r,c){const t=board[r][c];if(c>=2&&board[r][c-1]===t&&board[r][c-2]===t)return true;if(r>=2&&board[r-1][c]===t&&board[r-2][c]===t)return true;return false}
function findMatches(){const m=new Set();for(let r=0;r<GRID;r++)for(let c=0;c<GRID-2;c++){if(board[r][c]&&board[r][c]===board[r][c+1]&&board[r][c]===board[r][c+2]){let e=c+2;while(e+1<GRID&&board[r][e+1]===board[r][c])e++;for(let i=c;i<=e;i++)m.add(`${r},${i}`)}}
for(let c=0;c<GRID;c++)for(let r=0;r<GRID-2;r++){if(board[r][c]&&board[r][c]===board[r+1][c]&&board[r][c]===board[r+2][c]){let e=r+2;while(e+1<GRID&&board[e+1][c]===board[r][c])e++;for(let i=r;i<=e;i++)m.add(`${i},${c}`)}}
return[...m].map(s=>{const[r,c]=s.split(',').map(Number);return{r,c}})}
function removeMatches(matches){let bonus=0;const bigMatch=matches.length>=5;const medMatch=matches.length===4;if(bigMatch)bonus=matches.length*15;else if(medMatch)bonus=matches.length*5;const pts=(matches.length*10+bonus)*(1+comboCount*.5);score+=0|pts;document.getElementById('score').textContent=score;
const cf=document.getElementById('comboFloat');
if(bigMatch){cf.textContent=`💥 ${matches.length}连消! +${0|pts}`;cf.style.color='#ff6b6b';cf.classList.remove('show');void cf.offsetWidth;cf.classList.add('show');setTimeout(()=>{cf.classList.remove('show');cf.style.color='#ffd700'},1200);pt(784,0.15);setTimeout(()=>pt(988,0.15),80);setTimeout(()=>pt(1175,0.2),160);moves+=1}
else if(medMatch){cf.textContent=`✨ 4连消! +${0|pts}`;cf.style.color='#4ecdc4';cf.classList.remove('show');void cf.offsetWidth;cf.classList.add('show');setTimeout(()=>{cf.classList.remove('show');cf.style.color='#ffd700'},1000);pt(659,0.12);setTimeout(()=>pt(784,0.12),80)}
else if(comboCount>0){cf.textContent=`×${comboCount+1} COMBO! +${0|pts}`;cf.classList.remove('show');void cf.offsetWidth;cf.classList.add('show');setTimeout(()=>cf.classList.remove('show'),800);pt(523+comboCount*80,0.12)}
else{pt(523,0.1);setTimeout(()=>pt(659,0.1),50)}
const pCount=bigMatch?10:medMatch?7:4;
matches.forEach(({r,c})=>{const{x,y}=cellPos(r,c);spawnP(x+CELL/2,y+CELL/2,['#ffd700','#ff6b6b','#4ecdc4','#a855f7'][0|Math.random()*4],pCount);board[r][c]=null})}
function applyGravity(){const types=getTypes();let fell=false;for(let c=0;c<GRID;c++){let w=GRID-1;for(let r=GRID-1;r>=0;r--)if(board[r][c]!==null){if(r!==w){board[w][c]=board[r][c];board[r][c]=null;fell=true}w--}for(let r=w;r>=0;r--){board[r][c]=types[0|Math.random()*types.length];fell=true}}return fell}
function hasValidMoves(){for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){if(c+1<GRID){[board[r][c],board[r][c+1]]=[board[r][c+1],board[r][c]];if(findMatches().length>0){[board[r][c],board[r][c+1]]=[board[r][c+1],board[r][c]];return true}[board[r][c],board[r][c+1]]=[board[r][c+1],board[r][c]]}if(r+1<GRID){[board[r][c],board[r+1][c]]=[board[r+1][c],board[r][c]];if(findMatches().length>0){[board[r][c],board[r+1][c]]=[board[r+1][c],board[r][c]];return true}[board[r][c],board[r+1][c]]=[board[r+1][c],board[r][c]]}}return false}
function shuffleBoard(){const flat=board.flat();for(let i=flat.length-1;i>0;i--){const j=0|Math.random()*(i+1);[flat[i],flat[j]]=[flat[j],flat[i]]}for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++)board[r][c]=flat[r*GRID+c]}
function cellPos(r,c){return{x:PAD+c*(CELL+GAP),y:PAD+r*(CELL+GAP)}}
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle='rgba(20,18,40,0.95)';ctx.fillRect(0,0,canvas.width,canvas.height);
for(let r=0;r<GRID;r++)for(let c=0;c<GRID;c++){const{x,y}=cellPos(r,c);const rad=10;
ctx.save();ctx.shadowColor='rgba(0,0,0,0.3)';ctx.shadowBlur=6;ctx.shadowOffsetY=2;
ctx.fillStyle=(r+c)%2===0?'rgba(255,255,255,0.12)':'rgba(255,255,255,0.07)';ctx.beginPath();ctx.moveTo(x+rad,y);ctx.lineTo(x+CELL-rad,y);ctx.quadraticCurveTo(x+CELL,y,x+CELL,y+rad);ctx.lineTo(x+CELL,y+CELL-rad);ctx.quadraticCurveTo(x+CELL,y+CELL,x+CELL-rad,y+CELL);ctx.lineTo(x+rad,y+CELL);ctx.quadraticCurveTo(x,y+CELL,x,y+CELL-rad);ctx.lineTo(x,y+rad);ctx.quadraticCurveTo(x,y,x+rad,y);ctx.closePath();ctx.fill();ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=0.5;ctx.stroke();ctx.shadowColor='transparent';
if(board[r][c]){ctx.font='32px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(board[r][c],x+CELL/2,y+CELL/2+2)}ctx.restore()}
if(selected){const{x,y}=cellPos(selected.r,selected.c);ctx.strokeStyle='rgba(255,215,0,0.8)';ctx.lineWidth=3;ctx.strokeRect(x-2,y-2,CELL+4,CELL+4);ctx.fillStyle='rgba(255,215,0,0.12)';ctx.fillRect(x,y,CELL,CELL)}
pX.clearRect(0,0,pC.width,pC.height);scP=scP.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.life-=0.022;p.sz*=0.97;if(p.life<=0)return false;pX.globalAlpha=p.life;pX.fillStyle=p.col;pX.beginPath();pX.arc(p.x,p.y,p.sz,0,Math.PI*2);pX.fill();return true});pX.globalAlpha=1;
requestAnimationFrame(draw)}
async function processMatches(){animating=true;comboCount=0;
while(true){const matches=findMatches();if(!matches.length)break;removeMatches(matches);draw();await sleep(180);applyGravity();draw();await sleep(180);comboCount++;document.getElementById('combo').textContent=`×${comboCount+1}`}
comboCount=0;document.getElementById('combo').textContent='×1';if(!hasValidMoves())shuffleBoard();checkGameState();animating=false}
function checkGameState(){const target=getTarget();if(score>=target){document.getElementById('modalTitle').textContent=`🎉 第${level+1}关 过关！`;document.getElementById('modalScore').textContent=score;const types=getTypes();document.getElementById('modalMsg').textContent=`目标 ${target} 达成！下一关: ${types.length}种图案 · ${getMoves()}步 · 目标${getTarget()}`;document.getElementById('modalBtn').textContent='▶ 下一关';document.getElementById('modal').classList.add('show');const best=parseInt(localStorage.getItem('highscore_match_game')||'0');if(score>best)localStorage.setItem('highscore_match_game',score);return}
if(moves<=0){document.getElementById('modalTitle').textContent='💀 步数用完';document.getElementById('modalScore').textContent=score;document.getElementById('modalMsg').textContent=`第${level+1}关 · 目标 ${target}，差 ${target-score} 分`;document.getElementById('modalBtn').textContent='⟳ 重来';document.getElementById('modal').classList.add('show');const best=parseInt(localStorage.getItem('highscore_match_game')||'0');if(score>best)localStorage.setItem('highscore_match_game',score)}}
function restartOrNext(){document.getElementById('modal').classList.remove('show');if(score>=getTarget()){level++;score=0}else{score=0}moves=getMoves();initBoard();while(findMatches().length>0){findMatches().forEach(({r,c})=>board[r][c]=null);applyGravity()}updateUI()}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function updateUI(){document.getElementById('lvl').textContent=level+1;document.getElementById('score').textContent=score;document.getElementById('target').textContent=getTarget();document.getElementById('moves').textContent=moves}
function handleClick(px,py){if(animating)return;const c=0|((px-PAD)/(CELL+GAP)),r=0|((py-PAD)/(CELL+GAP));if(r<0||r>=GRID||c<0||c>=GRID)return;
if(!selected){selected={r,c};pt(600,0.04);return}
const dr=Math.abs(r-selected.r),dc=Math.abs(c-selected.c);
if((dr===1&&dc===0)||(dr===0&&dc===1)){const sr=selected.r,sc=selected.c;[board[sr][sc],board[r][c]]=[board[r][c],board[sr][sc]];
if(findMatches().length>0){moves--;document.getElementById('moves').textContent=moves;selected=null;pt(400,0.06,'square',0.06);processMatches()}else{[board[sr][sc],board[r][c]]=[board[r][c],board[sr][sc]];pt(200,0.08,'sawtooth',0.05);selected=null}}else if(r===selected.r&&c===selected.c)selected=null;else{selected={r,c};pt(600,0.04)}}
canvas.addEventListener('click',e=>{const r=canvas.getBoundingClientRect();handleClick((e.clientX-r.left)*canvas.width/r.width,(e.clientY-r.top)*canvas.height/r.height)});
canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0],r=canvas.getBoundingClientRect();handleClick((t.clientX-r.left)*canvas.width/r.width,(t.clientY-r.top)*canvas.height/r.height)},{passive:false});
moves=getMoves();initBoard();while(findMatches().length>0){findMatches().forEach(({r,c})=>board[r][c]=null);applyGravity()}updateUI();draw();
</script>
</body>
</html>
